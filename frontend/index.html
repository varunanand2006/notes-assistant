<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 1rem 1.5rem; font-size: 1.1rem; font-weight: 600; }
    #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 72%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #1a1a2e; color: #fff; border-bottom-right-radius: 3px; }
    .msg.assistant { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 3px; }
    .msg.thinking { color: #999; font-style: italic; }
    #input-row { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; background: #fff; border-top: 1px solid #e0e0e0; }
    #query { flex: 1; padding: 0.65rem 1rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; }
    #query:focus { border-color: #1a1a2e; }
    button { padding: 0.65rem 1.25rem; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>Notes Assistant</header>
  <div id="chat"></div>
  <div id="input-row">
    <input id="query" type="text" placeholder="Ask a question about your notes…" autocomplete="off" />
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('query');
    const btn = document.getElementById('send');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      btn.disabled = true;

      addMsg(q, 'user');
      const thinking = addMsg('Thinking…', 'assistant thinking');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q })
        });
        const data = await res.json();
        thinking.className = 'msg assistant';
        thinking.textContent = data.answer ?? data.detail ?? 'No answer returned.';
      } catch (e) {
        thinking.className = 'msg assistant';
        thinking.textContent = 'Error: could not reach the server.';
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
