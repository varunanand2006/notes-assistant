<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f1115;
      --panel-bg: rgba(255, 255, 255, 0.05);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --border: rgba(255, 255, 255, 0.1);
      --msg-user: #6366f1;
      --msg-assistant: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex; flex-direction: column; height: 100vh;
      background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.1), transparent 300px);
    }
    header {
      background: rgba(15, 17, 21, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }
    header::before {
      content: '';
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
    }
    #toggle-upload {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      display: flex; align-items: center; gap: 0.4rem;
    }
    #toggle-upload:hover {
      border-color: var(--accent);
      color: var(--text-main);
      background: rgba(99, 102, 241, 0.08);
      transform: none;
      box-shadow: none;
    }
    #toggle-upload.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    /* Upload panel */
    #upload-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease, padding 0.35s ease;
      background: rgba(12, 14, 18, 0.97);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      z-index: 9;
    }
    #upload-panel.open {
      max-height: 220px;
      padding: 1.25rem 2rem;
    }
    .panel-inner {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    #drop-zone {
      flex: 1;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.875rem;
      transition: all 0.2s ease;
      user-select: none;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.06);
      color: var(--text-main);
    }
    #drop-zone .drop-icon {
      font-size: 1.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    #browse-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }
    #drop-zone .file-types {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }
    .panel-right {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 150px;
    }
    #upload-status {
      font-size: 0.8rem;
      line-height: 1.4;
      min-height: 1.2em;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      display: none;
    }
    #upload-status.visible { display: block; }
    #upload-status.success { color: #4ade80; background: rgba(74, 222, 128, 0.08); }
    #upload-status.error   { color: #f87171; background: rgba(248, 113, 113, 0.08); }
    #upload-status.muted   { color: var(--text-muted); }
    #reingest-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      white-space: nowrap;
    }
    #reingest-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--text-main);
      background: rgba(99, 102, 241, 0.08);
      transform: none;
      box-shadow: none;
    }
    #reingest-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Chat */
    #chat {
      flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    .msg {
      max-width: 75%; padding: 1rem 1.25rem; border-radius: 16px; line-height: 1.6; white-space: pre-wrap;
      font-size: 0.95rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      animation: fadeIn 0.3s ease-out forwards;
      opacity: 0;
      transform: translateY(10px);
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      align-self: flex-end; background: var(--msg-user); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start; background: var(--msg-assistant); color: var(--text-main);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .msg.assistant p { margin-bottom: 0.75em; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant pre { background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 8px; overflow-x: auto; margin: 0.75rem 0; font-family: monospace; font-size: 0.9em; }
    .msg.assistant code { background: rgba(0,0,0,0.2); padding: 0.2em 0.4em; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    .msg.assistant pre code { background: transparent; padding: 0; }
    .msg.assistant ul, .msg.assistant ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .msg.assistant li { margin-bottom: 0.25rem; }
    .msg.assistant a { color: var(--accent); text-decoration: none; }
    .msg.assistant a:hover { text-decoration: underline; }
    .msg.thinking {
      color: var(--text-muted); font-style: italic;
      background: transparent; box-shadow: none; border: none; padding-left: 0;
      backdrop-filter: none;
    }

    /* Input row */
    #input-row {
      display: flex; gap: 1rem; padding: 1.5rem 2rem;
      background: rgba(15, 17, 21, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }
    #query {
      flex: 1; padding: 0.85rem 1.25rem;
      background: var(--panel-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 12px; font-size: 1rem; outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    #query::placeholder { color: var(--text-muted); }
    #query:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); background: rgba(255, 255, 255, 0.08); }
    #send {
      padding: 0.85rem 1.5rem; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: 1rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center;
    }
    #send:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
    #send:active:not(:disabled) { transform: translateY(0); }
    #send:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    Notes Assistant
    <button id="toggle-upload">&#x2B06; Upload Files</button>
  </header>

  <div id="upload-panel">
    <div class="panel-inner">
      <div id="drop-zone">
        <input id="file-input" type="file" multiple accept=".pdf,.md,.txt" hidden />
        <span class="drop-icon">&#x1F4C4;</span>
        <div>Drop files here, or <span id="browse-link">browse</span></div>
        <div class="file-types">Accepts .pdf &nbsp;.md &nbsp;.txt</div>
      </div>
      <div class="panel-right">
        <button id="reingest-btn">&#x21BB; Reingest all docs</button>
        <div id="upload-status"></div>
      </div>
    </div>
  </div>

  <div id="chat"></div>

  <div id="input-row">
    <input id="query" type="text" placeholder="Ask a question about your notes&#x2026;" autocomplete="off" />
    <button id="send">Send</button>
  </div>

  <script>
    // Chat
    const chat = document.getElementById('chat');
    const input = document.getElementById('query');
    const sendBtn = document.getElementById('send');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      sendBtn.disabled = true;

      addMsg(q, 'user');
      const msgDiv = addMsg('Thinking…', 'assistant thinking');

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q })
        });
        if (!res.ok) {
          msgDiv.textContent = 'Error: server returned ' + res.status;
          return;
        }
        const data = await res.json();
        msgDiv.classList.remove('thinking');
        const text = data.answer ?? data.detail ?? 'No answer returned.';
        msgDiv.innerHTML = marked.parse(text);
      } catch (e) {
        msgDiv.classList.remove('thinking');
        msgDiv.textContent = 'Error: could not reach the server.';
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    // Upload panel toggle
    const toggleBtn = document.getElementById('toggle-upload');
    const panel = document.getElementById('upload-panel');

    toggleBtn.addEventListener('click', () => {
      const isOpen = panel.classList.toggle('open');
      toggleBtn.classList.toggle('active', isOpen);
      toggleBtn.innerHTML = isOpen
        ? '&#x2715; Close'
        : '&#x2B06; Upload Files';
    });

    // Drop zone
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const browseLink = document.getElementById('browse-link');
    const statusEl = document.getElementById('upload-status');
    const reingestBtn = document.getElementById('reingest-btn');

    browseLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFiles(fileInput.files);
    });

    async function uploadFiles(files) {
      const formData = new FormData();
      for (const f of files) formData.append('files', f);

      setStatus('Uploading…', 'muted');

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok || data.error) {
          setStatus('Error: ' + (data.error || data.detail || res.status), 'error');
        } else {
          setStatus('Added ' + data.added + ' chunk(s) from: ' + data.files.join(', '), 'success');
        }
      } catch (e) {
        setStatus('Upload failed: could not reach server.', 'error');
      } finally {
        fileInput.value = '';
      }
    }

    reingestBtn.addEventListener('click', async () => {
      reingestBtn.disabled = true;
      setStatus('Rebuilding index from all docs…', 'muted');
      try {
        const res = await fetch('/reingest', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) {
          setStatus('Error: ' + (data.detail || res.status), 'error');
        } else if (data.status === 'no_docs') {
          setStatus('No documents found in docs/.', 'error');
        } else {
          setStatus('Rebuilt index with ' + data.chunks + ' chunk(s).', 'success');
        }
      } catch (e) {
        setStatus('Reingest failed: could not reach server.', 'error');
      } finally {
        reingestBtn.disabled = false;
      }
    });

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'visible ' + type;
    }
  </script>
</body>
</html>
